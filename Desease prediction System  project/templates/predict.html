<!doctype html>
<html>
  <head>
    <title>Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dashboard.css') }}"
    />
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>🩺 Disease</h2>

        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/train">⚙️ Train Model</a>
        <a href="/predict" class="active">📊 Predict</a>
        <a href="/history">📁 History</a>
        <a href="/logout">🚪 Logout</a>
      </div>

      <!-- MAIN -->
      <div class="main">
        <div class="topbar">
          <h2>Prediction</h2>
          <p>👋 {{ session['user'] }}</p>
        </div>

        <!-- CARD -->
        <div class="card" style="max-width: 1000px">
          <h3>Enter Patient Symptoms</h3>

          <form method="POST">
            <label>name</label>
            <input
              type="name"
              name="name"
              placeholder="name of the patient"
              required
            />
            <label>Fever</label>
            <input type="number" name="fever" placeholder="0 or 1" required />

            <label>Cough</label>
            <input type="number" name="cough" placeholder="0 or 1" required />

            <label>Fatigue</label>
            <input type="number" name="fatigue" placeholder="0 or 1" required />

            <button type="submit" class="btn">Predict Disease</button>
          </form>

          {% if result %}
          <div class="result-box">
            <h4>Prediction Result:</h4>
            <p>{{ result }}</p>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
